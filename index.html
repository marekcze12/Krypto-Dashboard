<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krypto Dashboard | Prohlížeč trhu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="kontejner">
        <header>
            <h1>Krypto Dashboard</h1>
            <div class="ovladani">
                <input type="text" id="hledat-vstup" placeholder="Hledej měnu (např. BTC)...">
                
                <select id="razeni-select">
                    <option value="market_cap_desc">Tržní kapitalizace</option>
                    <option value="price_desc">Nejdražší</option>
                    <option value="change_desc">Největší růst (24h)</option>
                </select>

                <button id="btn-obnovit">🔄 Aktualizovat</button>
            </div>
            <p id="info-cas"></p>
        </header>

        <main id="list-kryptomen" class="grid">
            </main>
    </div>

    <footer class="hlavni-footer">
        <div class="footer-obsah">
            <p>&copy; 2026 Krypto Dashboard | Developed by <strong>Marek Maněk</strong></p>
            <div class="footer-odkazy">
                <a href="https://github.com/marekcze12" target="_blank">GitHub</a>
                <a href="https://www.linkedin.com/in/marek-man%C4%9Bk-5a9947339/" target="_blank">LinkedIn</a>
                <a href="mailto:marek.manek.dj@seznam.cz">Kontakt</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
